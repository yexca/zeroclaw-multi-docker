# Copy to config/manager.yaml for local use.

version: 1

server:
  bind_host: 127.0.0.1
  host_port: 7652

docker:
  proxy_url: http://docker-socket-proxy:2375
  project_name: zeroclaw-matrix-multi
  control_network: zeroclaw-matrix-multi_manager-control
  runtime_network: zeroclaw-matrix-multi_default
  matrix_host_ip: 127.0.0.1
  storage_driver: volume
  volume_prefix: zeroclaw-matrix-multi

paths:
  secrets_file: /app/config/secrets.yaml
  generated_dir: /app/config/generated
  instances_dir: /app/instances
  # Host paths are used only when docker.storage_driver is bind.
  # Override these if bind mode cannot infer the project path.
  # host_project_dir: /absolute/path/to/zeroclaw_multi_docker
  # host_instances_dir: /absolute/path/to/zeroclaw_multi_docker/instances
  # host_bootstrap_dir: /absolute/path/to/zeroclaw_multi_docker/bootstrap

defaults:
  zeroclaw_image: ghcr.io/zeroclaw-labs/zeroclaw:v0.8.1-debian
  matrix:
    homeserver: https://matrix.example.com
    allowed_rooms:
      - "!roomid:matrix.example.com"
    mention_only: false
    interrupt_on_new_message: true
    reply_in_thread: false
    ack_reactions: true
    stream_mode: multi_message
    multi_message: false
    multi_message_delay_ms: 800
    channel_debounce_ms: 0

vision:
  model: gpt-4o
  base_url: https://api.openai.com/v1
  wire_api: chat_completions
  allow_remote_fetch: false
  max_images: 4
  max_image_size_mb: 5
  max_image_turns: 2

heartbeat:
  enabled: false
  interval_minutes: 30
  two_phase: true
  message: ""
  adaptive: false
  min_interval_minutes: 5
  max_interval_minutes: 120
  deadman_timeout_minutes: 0
  max_run_history: 100
  load_session_context: false
  task_timeout_secs: 600

pacing:
  loop_ignore_tools:
    - home__job_status
  loop_detection_enabled: true
  loop_detection_window_size: 20
  loop_detection_max_repeats: 3

runtime:
  shell_timeout_secs: 300
  shell_tool_timeout_secs: 300

profiles:
  llm:
    - id: deepseek-text
      provider_family: deepseek
      provider_alias: text
      model: deepseek-v4-flash
      base_url: https://api.deepseek.com/v1
      wire_api: chat_completions
      timeout_secs: 120
    - id: ollama-local
      provider_family: ollama
      provider_alias: local
      model: qwen2.5:14b
      base_url: http://host.docker.internal:11434
      wire_api: chat_completions
      timeout_secs: 600
    - id: gemini-flash
      provider_family: gemini
      provider_alias: flash
      model: gemini-2.5-flash
      timeout_secs: 120
  matrix:
    - id: matrix-default
      homeserver: https://matrix.example.com
      allowed_rooms:
        - "!roomid:matrix.example.com"
      mention_only: false
      interrupt_on_new_message: true
      reply_in_thread: false
      ack_reactions: true
      stream_mode: multi_message
      multi_message: false
      multi_message_delay_ms: 800
      channel_debounce_ms: 0
  mcp:
    - id: mcp-home
      enabled: false
      server_name: home
      transport: sse
      url: http://host.docker.internal:8787/mcp
      deferred_loading: false
      tool_timeout_secs: 120

prompt_templates:
  - id: default
    name: Default workspace
    files:
      AGENTS.md: ""
      IDENTITY.md: ""
      SOUL.md: ""
      MEMORY.md: ""
      TOOLS.md: ""
      USER.md: ""
      HEARTBEAT.md: ""

agents:
  - id: agent1
    enabled: true
    host_port: 42641
    image: ghcr.io/zeroclaw-labs/zeroclaw:v0.8.1-debian
    llm_profile: deepseek-text
    matrix_profile: matrix-default
    mcp_profile: mcp-home
    prompt_template: default
    proactive:
      enabled: true
      random_min_minutes: 120
      random_max_minutes: 240
      poll_seconds: 300
      quiet_hours: "23-8"
      timezone: Asia/Tokyo
      channel: matrix.home
      target: ""
      prompt: 'You are being invoked by the proactive sidecar, not by the user. Review PROACTIVE.md, memory, and current context. If there is a concrete, timely reason to contact the user, send one short Matrix message with send_message_to_peer using the configured channel and peer target. If there is no useful reason, respond exactly with "skip".'
    matrix:
      user_id: "@agent1:matrix.example.com"
      device_id: ZEROCLAW_AGENT1
      external_peers:
        - "@you:matrix.example.com"
        - "#agent1-room:matrix.example.com"
  - id: agent2
    enabled: true
    host_port: 42642
    image: ghcr.io/zeroclaw-labs/zeroclaw:v0.8.1-debian
    llm_profile: ollama-local
    matrix_profile: matrix-default
    mcp_profile: mcp-home
    prompt_template: default
    matrix:
      user_id: "@agent2:matrix.example.com"
      device_id: ZEROCLAW_AGENT2
      external_peers:
        - "@you:matrix.example.com"
        - "#agent2-room:matrix.example.com"
  - id: agent3
    enabled: true
    host_port: 42643
    image: ghcr.io/zeroclaw-labs/zeroclaw:v0.8.1-debian
    llm_profile: gemini-flash
    matrix_profile: matrix-default
    mcp_profile: mcp-home
    prompt_template: default
    matrix:
      user_id: "@agent3:matrix.example.com"
      device_id: ZEROCLAW_AGENT3
      external_peers:
        - "@you:matrix.example.com"
        - "#agent3-room:matrix.example.com"
