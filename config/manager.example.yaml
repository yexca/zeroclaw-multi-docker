# Copy to config/manager.yaml for local use.

version: 2

webui:
  default_language: en
  default_theme: system

server:
  bind_host: 127.0.0.1
  host_port: 7652

docker:
  proxy_url: http://docker-socket-proxy:2375
  project_name: zeroclaw-dockyard
  control_network: zeroclaw-dockyard_manager-control
  runtime_network: zeroclaw-dockyard_default
  matrix_host_ip: 127.0.0.1
  storage_driver: volume
  volume_prefix: zeroclaw-dockyard

paths:
  secrets_file: /app/config/secrets.yaml
  generated_dir: /app/config/generated
  instances_dir: /app/instances

skills:
  allow_scripts: false
  open_skills_enabled: false
  registry_url: https://github.com/zeroclaw-labs/zeroclaw-skills
  prompt_injection_mode: full
  extra_registries: []
  skill_creation:
    enabled: false
    max_skills: 500
    similarity_threshold: 0.85
  install_suggestions:
    enabled: false
  skill_improvement:
    enabled: false
    cooldown_secs: 3600
    nudge_interval_iterations: 10
    max_review_iterations: 8

defaults:
  zeroclaw_image: ghcr.io/zeroclaw-labs/zeroclaw:v0.8.1-debian

heartbeat:
  enabled: false
  interval_minutes: 30
  two_phase: true
  message: ""
  adaptive: false
  min_interval_minutes: 5
  max_interval_minutes: 120
  deadman_timeout_minutes: 0
  max_run_history: 100
  load_session_context: false
  task_timeout_secs: 600

pacing:
  loop_ignore_tools:
    - home__job_status
  loop_detection_enabled: true
  loop_detection_window_size: 20
  loop_detection_max_repeats: 3

runtime:
  shell_timeout_secs: 300
  shell_tool_timeout_secs: 300
  max_history_messages: 80

config_modules:
  llm_dir: config/llm
  vision_dir: config/vision
  matrix_dir: config/matrix
  mcp_dir: config/mcp
  agents_dir: config/agents
  prompts_dir: config/prompts
  skills_dir: config/skills
  secrets_file: config/secrets.yaml
