name: zeroclaw-dockyard

services:
  docker-socket-proxy:
    image: ${DOCKER_SOCKET_PROXY_IMAGE:-tecnativa/docker-socket-proxy:0.3.0}
    container_name: zeroclaw-docker-socket-proxy
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${DOCKER_SOCKET_PROXY_LOG_LEVEL:-info}
      PING: ${DOCKER_SOCKET_PROXY_PING:-1}
      VERSION: ${DOCKER_SOCKET_PROXY_VERSION:-1}
      EVENTS: ${DOCKER_SOCKET_PROXY_EVENTS:-0}
      POST: ${DOCKER_SOCKET_PROXY_POST:-1}
      CONTAINERS: ${DOCKER_SOCKET_PROXY_CONTAINERS:-1}
      ALLOW_START: ${DOCKER_SOCKET_PROXY_ALLOW_START:-1}
      ALLOW_STOP: ${DOCKER_SOCKET_PROXY_ALLOW_STOP:-1}
      ALLOW_RESTARTS: ${DOCKER_SOCKET_PROXY_ALLOW_RESTARTS:-1}
      ALLOW_PAUSE: ${DOCKER_SOCKET_PROXY_ALLOW_PAUSE:-0}
      ALLOW_UNPAUSE: ${DOCKER_SOCKET_PROXY_ALLOW_UNPAUSE:-0}
      IMAGES: ${DOCKER_SOCKET_PROXY_IMAGES:-1}
      NETWORKS: ${DOCKER_SOCKET_PROXY_NETWORKS:-1}
      AUTH: ${DOCKER_SOCKET_PROXY_AUTH:-0}
      BUILD: ${DOCKER_SOCKET_PROXY_BUILD:-0}
      COMMIT: ${DOCKER_SOCKET_PROXY_COMMIT:-0}
      CONFIGS: ${DOCKER_SOCKET_PROXY_CONFIGS:-0}
      DISTRIBUTION: ${DOCKER_SOCKET_PROXY_DISTRIBUTION:-0}
      EXEC: ${DOCKER_SOCKET_PROXY_EXEC:-0}
      GRPC: ${DOCKER_SOCKET_PROXY_GRPC:-0}
      INFO: ${DOCKER_SOCKET_PROXY_INFO:-0}
      NODES: ${DOCKER_SOCKET_PROXY_NODES:-0}
      PLUGINS: ${DOCKER_SOCKET_PROXY_PLUGINS:-0}
      SECRETS: ${DOCKER_SOCKET_PROXY_SECRETS:-0}
      SERVICES: ${DOCKER_SOCKET_PROXY_SERVICES:-0}
      SESSION: ${DOCKER_SOCKET_PROXY_SESSION:-0}
      SWARM: ${DOCKER_SOCKET_PROXY_SWARM:-0}
      SYSTEM: ${DOCKER_SOCKET_PROXY_SYSTEM:-0}
      TASKS: ${DOCKER_SOCKET_PROXY_TASKS:-0}
      VOLUMES: ${DOCKER_SOCKET_PROXY_VOLUMES:-1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - manager-control

  manager:
    build:
      context: ./manager
    image: ${MANAGER_IMAGE:-yexca/zeroclaw-dockyard:v0.2.0}
    pull_policy: missing
    container_name: zeroclaw-dockyard
    restart: unless-stopped
    depends_on:
      - docker-socket-proxy
    ports:
      - "127.0.0.1:${MANAGER_HOST_PORT:-7652}:7652"
    environment:
      MANAGER_BIND_HOST: 0.0.0.0
      MANAGER_PORT: 7652
      DOCKER_API_URL: ${DOCKER_API_URL:-http://docker-socket-proxy:2375}
      MANAGER_CONFIG_PATH: /app/config/manager.yaml
      MANAGER_SECRETS_PATH: /app/config/secrets.yaml
      GENERATED_CONFIG_DIR: /app/config/generated
      ZEROCLAW_IMAGE: ${ZEROCLAW_IMAGE:-ghcr.io/zeroclaw-labs/zeroclaw:v0.8.1-debian}
    volumes:
      - ./bootstrap:/app/bootstrap:ro
      - ./config:/app/config
      - ./instances:/app/instances
      - ./shared:/app/shared
    networks:
      - default
      - manager-control

networks:
  manager-control:
    internal: true
