<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#18181b" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>ZeroClaw Dockyard</title>
    <script>
      (() => {
        try {
          const storedMode = localStorage.getItem("zeroclaw.webui.theme") || "system";
          const mode = ["light", "dark", "system"].includes(storedMode) ? storedMode : "system";
          const resolved =
            mode === "system" && window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : mode === "system" ? "light" : mode;
          document.documentElement.dataset.themeMode = mode;
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme = resolved;
        } catch (_error) {
          document.documentElement.dataset.themeMode = "system";
        }
      })();
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app">
      <main class="boot-shell" aria-busy="true">
        <aside class="boot-sidebar">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </aside>
        <section class="boot-panel">
          <div class="boot-line title"></div>
          <div class="boot-line"></div>
          <div class="boot-grid">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
